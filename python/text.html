<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Simple Memo</title>

  <style>
    body {
      margin: 0;
      padding: 30px;
      font-family: Arial, sans-serif;
      background-color: #111827;
      color: white;
    }

    h1 {
      color: #38bdf8;
    }

    textarea {
      width: 100%;
      height: 300px;
      padding: 15px;
      font-size: 16px;
      background-color: #020617;
      color: white;
      border: 1px solid #334155;
      border-radius: 10px;
      resize: none;
      outline: none;
    }

    button {
      margin-top: 12px;
      padding: 12px 18px;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    #saveBtn {
      background-color: #38bdf8;
    }

    #loadBtn {
      background-color: #22c55e;
    }

    #clearBtn {
      background-color: #ef4444;
      color: white;
    }

    #status {
      margin-top: 12px;
      color: #cbd5e1;
    }
  </style>
</head>

<body>
  <h1>Simple Memo</h1>

  <textarea id="memo" placeholder="메모를 입력하세요."></textarea>

  <br>

  <button id="saveBtn" onclick="saveNote()">저장</button>
  <button id="loadBtn" onclick="loadNote()">불러오기</button>
  <button id="clearBtn" onclick="clearMemo()">지우기</button>

  <p id="status">준비됨</p>

  <script>
    const memo = document.getElementById("memo");
    const statusText = document.getElementById("status");

    async function saveNote() {
      const text = memo.value;

      const result = await window.pywebview.api.save_note(text);

      statusText.textContent = "저장 완료: " + result.path;
    }

    async function loadNote() {
      const result = await window.pywebview.api.load_note();

      memo.value = result.text;
      statusText.textContent = "불러오기 완료";
    }

    function clearMemo() {
      memo.value = "";
      statusText.textContent = "화면 내용 삭제됨";
    }

    window.addEventListener("pywebviewready", function () {
      loadNote();
    });
  </script>
</body>
</html>
